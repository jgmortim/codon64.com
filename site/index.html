<html lang="en">
    <head>
		<meta charset="UTF-8">
		<title>Codon64</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script src="codon64.js"></script>
		<link rel="stylesheet" href="styles.css">
    </head>
    <body>
		<h1>Codon64</h1>
		<main>
			<div class="function-container">
				<label id="plaintext-label" for="plaintext">Plaintext:</label>
				<textarea id="plaintext"></textarea>
				<div id="operations">
					<button id="encode" onclick="encode()">
						<span class="long-text">Encode →</span>
						<span class="short-text">↓ Encode ↓</span>
					</button>
					<button id="decode" onclick="decode()">
						<span class="long-text">← Decode</span>
						<span class="short-text">↑ Decode ↑</span>
					</button>
				</div>
				<label id="ciphertext-label" for="ciphertext">Ciphertext:</label>
				<textarea id="ciphertext"></textarea>
				<div id="password-container">
					<label for="password">Password:</label>
					<input type="text" id="password" placeholder="optional"/>
				</div>
			</div>
		</main>
		<script src="index.js"></script>
    </body>
</html>
