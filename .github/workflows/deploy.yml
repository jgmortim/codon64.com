name: Deploy Website

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install minifiers
        run: |
          npm install -g html-minifier-terser clean-css-cli terser

      - name: Minify site
        run: |
          mkdir -p dist

          # Copy everything first
          cp -r site/* dist/

          # Minify HTML
          find dist -name "*.html" -exec html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --minify-css true \
            --minify-js true \
            -o {} {} \;

          # Minify CSS
          find dist -name "*.css" -exec cleancss -o {} {} \;

          # Minify JS
          find dist -name "*.js" -exec terser {} -o {} -c -m \;

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.DREAMHOST_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            dist/ \
            ${{ secrets.DREAMHOST_USERNAME }}@${{ secrets.DREAMHOST_HOST }}:/home/${{ secrets.DREAMHOST_USERNAME }}/codon64.com/
